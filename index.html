<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Credit Card UI Design</title>
</head>
<body>
    <div class="container">
        <header>
            <span class="logo">
                <img src="imagem/logo1.png" alt="">
                <h5 style="color: white;">Master Card</h5>
            </span>
            <img src="imagem/chip1.jpg" alt="" class="chip">
        </header>
        <div class="card-details" style="color: white;">
            <div class="name-number">
                <h6>Card Number</h6>
                <h5 class="number">8050 5040 2030 3020</h5>
                <h5 class="name">Prem Kumar Shahi</h5>
            </div>
            <div class="valid-date"></div>
            <h6>Valid Thru</h6>
            <h5>05/28</h5>
        </div>
    </div>
</body>
</html>
